```html
<!DOCTYPE html>
<html>
<head>
  <title>Talk to Aiko</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="card">
    <h1>🌸 Talk to Aiko 🌸</h1>

    <textarea id="message" placeholder="Say something to Aiko..."></textarea>

    <button onclick="talkToAiko()">
      Send
    </button>

    <div id="response"></div>
  </div>

<script>
async function talkToAiko() {

  const message =
    document.getElementById("message").value;

  const responseDiv =
    document.getElementById("response");

  responseDiv.innerHTML = "Aiko is thinking...";

  try {

    const response = await fetch(
      "YOUR_RAILWAY_URL/chat",
      {
        method: "POST",

        headers: {
          "Content-Type": "application/json"
        },

        body: JSON.stringify({
          message: message
        })
      }
    );

    const data = await response.json();

    responseDiv.innerHTML = data.reply;

  } catch (error) {

    responseDiv.innerHTML =
      "Error talking to Aiko 😭";
  }
}
</script>

</body>
</html>
```
